<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Masqucerade INC.</title>
  <meta name="description" content="Masqucerade INC. — Monarc: оригинальные дизайнерские бренды. Type Clothes: повседневная одежда в безупречном исполнении.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site/site.css?v=3">
</head>
<body class="landing">

  <main class="split-wrap">

    <!-- Медальон бренда на шве -->
    <div class="split-seal" aria-hidden="true">
      <span>M</span>
    </div>

    <!-- Слева: Monarc — тёмный люкс -->
    <a class="split-half half-monarc" href="/monarc">
      <div class="bg-glow bg-glow-1"></div>
      <div class="bg-grain"></div>
      <div class="half-inner">
        <p class="half-kicker">Оригинал</p>
        <h1 class="half-title">Monarc</h1>
        <p class="half-desc">Оригинальные дизайнерские бренды — ERD, Chrome&nbsp;Hearts, Balenciaga, Rick&nbsp;Owens и другие.</p>
        <span class="half-cta">
          Смотреть коллекцию
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="4" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/>
          </svg>
        </span>
      </div>
    </a>

    <!-- Справа: Type Clothes — светлый минимализм -->
    <a class="split-half half-type" href="/type">
      <div class="half-inner">
        <p class="half-kicker">Люкс-качество</p>
        <h1 class="half-title">Type Clothes</h1>
        <p class="half-desc">Повседневная одежда в безупречном исполнении — премиальные материалы и точный крой на каждый день.</p>
        <span class="half-cta">
          Смотреть каталог
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="4" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/>
          </svg>
        </span>
      </div>
    </a>

  </main>

  <footer class="split-foot">© <span id="year"></span> Masqucerade INC.</footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
