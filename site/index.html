<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Masqucerade INC.</title>
  <meta name="description" content="Masqucerade INC. — витрина наличия: брендовые вещи и люкс-качество.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site/site.css?v=2">
</head>
<body class="landing">

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-grain"></div>

  <main class="landing-wrap">
    <header class="landing-brand">
      <div class="brand-mark">M</div>
      <h1>Masqucerade <span>INC.</span></h1>
      <p class="brand-tagline">Витрина наличия</p>
    </header>

    <div class="portal-cards">
      <a class="portal-card" href="/brands">
        <div class="portal-num">01</div>
        <h2>Brands</h2>
        <p>Коллекция Monarc</p>
        <span class="portal-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="4" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/>
          </svg>
        </span>
      </a>

      <a class="portal-card" href="/type">
        <div class="portal-num">02</div>
        <h2>Type</h2>
        <p>Люкс-качество</p>
        <span class="portal-arrow">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <line x1="4" y1="12" x2="20" y2="12"/><polyline points="13 5 20 12 13 19"/>
          </svg>
        </span>
      </a>
    </div>

    <footer class="landing-foot">© <span id="year"></span> Masqucerade INC.</footer>
  </main>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
