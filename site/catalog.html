<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!--META-->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site/site.css?v=33">
</head>
<body class="catalog">

  <div class="bg-grain"></div>

  <div class="promo-bar" id="promoBar" hidden></div>

  <header class="site-header">
    <a class="site-logo" href="/">
      <span class="brand-mark brand-mark-sm">M</span>
      <span id="logoName">Masqucerade</span>
    </a>
    <nav class="site-nav" id="siteNav"></nav>
  </header>

  <main class="catalog-wrap">
    <section class="catalog-hero">
      <div class="hero-titles">
        <p class="catalog-kicker" id="sectionKicker"></p>
        <h1 id="sectionTitle"></h1>
      </div>
      <button class="filters-btn" id="filtersBtn" type="button" hidden>Фильтры</button>
    </section>

    <div class="cat-chips cat-filter" id="catChips" hidden></div>

    <div id="siteBlocks"></div>

    <div id="collectionsWrap"></div>

    <h2 class="grid-heading" id="gridHeading" hidden>Все товары</h2>

    <div class="goods-grid" id="goodsGrid">
      <div class="site-loader">Загружаем…</div>
    </div>

    <section class="faq-section" id="faqSection" hidden>
      <h2>Вопросы и ответы</h2>
      <div class="faq-acc" id="faqAcc"></div>
    </section>
  </main>

  <footer class="site-foot">
    <span>© 2023 Masqucerade INC.</span>
    <a id="footTg" href="#" target="_blank" rel="noopener">Telegram</a>
  </footer>

  <script src="/site/site.js?v=36"></script>
</body>
</html>
