<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!--META-->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/site/site.css?v=54">
</head>
<body class="catalog">

  <div class="bg-grain"></div>

  <div class="promo-bar" id="promoBar" hidden></div>

  <header class="site-header">
    <a class="site-logo" href="/">
      <span class="brand-mark brand-mark-sm">M</span>
      <span id="logoName">Masqucerade</span>
    </a>
    <nav class="site-nav" id="siteNav"></nav>
    <div class="header-side">
      <button class="search-btn" id="searchBtn" type="button" aria-label="Поиск">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.2" y2="16.2"/>
        </svg>
      </button>
      <button class="burger-btn" id="burgerBtn" type="button" aria-label="Открыть меню">
        <span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Поиск — полноэкранный оверлей (как у Gurbich) -->
  <div class="search-overlay" id="searchOverlay" aria-hidden="true">
    <div class="so-top">
      <svg class="so-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.2" y2="16.2"/>
      </svg>
      <input id="soInput" class="so-input" type="text" placeholder="Найти товар…" autocomplete="off" spellcheck="false">
      <button class="mob-close" id="soClose" type="button" aria-label="Закрыть поиск">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="so-label" id="soLabel">Все товары</div>
    <div class="so-results" id="soResults"></div>
  </div>

  <!-- Мобильное меню — полноэкранный аккордеон (как у Gurbich) -->
  <div class="mob-menu" id="mobMenu" aria-hidden="true">
    <div class="mob-menu-top">
      <a class="site-logo" href="/">
        <span class="brand-mark brand-mark-sm">M</span>
        <span id="mobLogoName">Masqucerade</span>
      </a>
      <button class="mob-close" id="mobCloseBtn" type="button" aria-label="Закрыть меню">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <nav class="mob-menu-body" id="mobMenuBody"></nav>
    <div class="mob-menu-foot">
      <button class="mob-foot-link" id="mobSearchBtn" type="button">Поиск</button>
      <a id="mobTg" href="#" target="_blank" rel="noopener">Написать в Telegram →</a>
    </div>
  </div>

  <!-- Обложка раздела (блок «Обложка» из панели) — полноэкранное превью -->
  <div id="siteCover"></div>

  <main class="catalog-wrap">
    <section class="catalog-hero">
      <div class="hero-titles">
        <p class="catalog-kicker" id="sectionKicker"></p>
        <h1 id="sectionTitle"></h1>
      </div>
      <div class="catalog-tools" id="catalogTools">
        <button class="filters-btn" id="filtersBtn" type="button" hidden>Фильтры</button>
        <div class="sort-wrap" id="sortWrap" hidden>
          <button class="sort-btn" id="sortBtn" type="button" aria-label="Сортировка" aria-expanded="false">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="9" y2="18"/>
            </svg>
          </button>
          <div class="sort-menu" id="sortMenu" hidden></div>
        </div>
      </div>
    </section>

    <div class="cat-chips cat-filter" id="catChips" hidden></div>

    <div id="siteBlocks"></div>

    <div id="collectionsWrap"></div>

    <div class="grid-head-row">
      <h2 class="grid-heading" id="gridHeading" hidden>Все товары</h2>
    </div>

    <div class="goods-grid" id="goodsGrid">
      <div class="site-loader">Загружаем…</div>
    </div>

    <section class="faq-section" id="faqSection" hidden>
      <h2>Вопросы и ответы</h2>
      <div class="faq-acc" id="faqAcc"></div>
    </section>
  </main>

  <!-- Подсказка «листайте вниз» — до первого скролла -->
  <button class="scroll-hint" id="scrollHint" type="button" hidden>
    <span>Листайте вниз</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  <footer class="site-foot">
    <span>© 2023 Masqucerade INC.</span>
    <a id="footTg" href="#" target="_blank" rel="noopener">Telegram</a>
  </footer>

  <script src="/site/site.js?v=51"></script>
  <script src="/site/popup.js?v=2" defer></script>
</body>
</html>
